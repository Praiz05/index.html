<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List App</title>
    <link rel="stylesheet" href="todo.css">
</head>
<body>
    
    <h1>22/EG/CO/1735</h1>
    
    <div class="app-container">
        <h1 class="app-title">📝 To-Do List App</h1>
        
        <div class="input-container">
            <input type="text" id="task" placeholder="Add a new task...">
            <button onclick="addTask()">Add Task</button>
        </div>
        
        <div class="task-stats">
            <span>Total Tasks: <span id="taskCount">0</span></span>
            <button onclick="clearAllTasks()" class="clear-btn">Clear All</button>
        </div>
        
        <ul id="list"></ul>
        
        <div class="info">
            <p>💡 Tip: Click on a task to mark it as complete (strikethrough)</p>
            <p>🗑️ Click the Delete button to remove a task</p>
        </div>
    </div>
    
    <script src="todo.js"></script>
</body>
</html>
